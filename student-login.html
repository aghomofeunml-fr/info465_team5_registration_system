<!-- Linear/Transactional page - Navigation Shell Suppressed -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-lg border border-outline-variant p-xl shadow-sm">
<!-- Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">Student Login</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to continue to your dashboard.</p>
</div>
<!-- Role Selection -->
<div class="flex gap-sm mb-lg bg-surface-container-low p-md rounded-lg" role="tablist"><button aria-selected="true" class="flex-1 py-md px-md rounded-lg bg-primary text-on-primary font-label-sm text-label-sm font-semibold shadow-sm transition-all" role="tab">Student</button><button aria-selected="false" class="flex-1 py-md px-md rounded-lg text-on-surface-variant hover:bg-surface-variant font-label-sm text-label-sm font-semibold transition-all" role="tab">Instructor</button></div>
<!-- Login Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface bg-surface-container-lowest" id="email" name="email" placeholder="student@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-xs text-label-xs text-primary hover:text-on-primary-fixed-variant" href="index.html">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface bg-surface-container-lowest" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-sm space-y-md">
<button class="w-full flex justify-center items-center py-md px-lg border border-transparent rounded-DEFAULT shadow-sm font-label-sm text-label-sm font-semibold text-on-primary bg-primary hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                    Sign In
                </button>
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-sm bg-surface-container-lowest font-label-xs text-label-xs text-outline">Or continue with</span>
</div>
</div>
<button class="w-full flex justify-center items-center py-sm px-lg border border-outline rounded-DEFAULT shadow-sm font-label-sm text-label-sm font-medium text-on-surface bg-surface-container-lowest hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors gap-sm" type="button">
